  tempban: "<gradient:#E74C3C:#C0392B><bold>⚠ STAFF</bold></gradient> <dark_gray>┃ <white><staff> <#FF8E8E>temp-banned <white><player> <#FF8E8E>for <#FFD93D><duration> <#FF8E8E>— <#B0B0B0><reason>"
  ipban: "<gradient:#E74C3C:#C0392B><bold>⚠ STAFF</bold></gradient> <dark_gray>┃ <white><staff> <#FF8E8E>IP-banned <white><player> <#FF8E8E>for: <#B0B0B0><reason>"
  mute: "<gradient:#E74C3C:#C0392B><bold>⚠ STAFF</bold></gradient> <dark_gray>┃ <white><staff> <#8BC4EA>permanently muted <white><player> <#8BC4EA>for: <#B0B0B0><reason>"
  tempmute: "<gradient:#E74C3C:#C0392B><bold>⚠ STAFF</bold></gradient> <dark_gray>┃ <white><staff> <#8BC4EA>temp-muted <white><player> <#8BC4EA>for <#FFD93D><duration> <#8BC4EA>— <#B0B0B0><reason>"
  voicemute: "<gradient:#E74C3C:#C0392B><bold>⚠ STAFF</bold></gradient> <dark_gray>┃ <white><staff> <#CE93D8>voice muted <white><player> <#CE93D8>for: <#B0B0B0><reason>"
  tempvoicemute: "<gradient:#E74C3C:#C0392B><bold>⚠ STAFF</bold></gradient> <dark_gray>┃ <white><staff> <#CE93D8>temp voice muted <white><player> <#CE93D8>for <#FFD93D><duration> <#CE93D8>— <#B0B0B0><reason>"
  warn: "<gradient:#E74C3C:#C0392B><bold>⚠ STAFF</bold></gradient> <dark_gray>┃ <white><staff> <#FFCC80>warned <white><player> <#FFCC80>for: <#B0B0B0><reason>"
  kick: "<gradient:#E74C3C:#C0392B><bold>⚠ STAFF</bold></gradient> <dark_gray>┃ <white><staff> <#FFAB91>kicked <white><player> <#FFAB91>for: <#B0B0B0><reason>"
  freeze: "<gradient:#E74C3C:#C0392B><bold>⚠ STAFF</bold></gradient> <dark_gray>┃ <white><staff> <#80DEEA>froze <white><player><#80DEEA>."
  unfreeze: "<gradient:#E74C3C:#C0392B><bold>⚠ STAFF</bold></gradient> <dark_gray>┃ <white><staff> <#80DEEA>unfroze <white><player><#80DEEA>."
  voidjail: "<gradient:#E74C3C:#C0392B><bold>⚠ STAFF</bold></gradient> <dark_gray>┃ <white><staff> <#FF8E8E>void jailed <white><player><#FF8E8E>."
  unban: "<gradient:#E74C3C:#C0392B><bold>⚠ STAFF</bold></gradient> <dark_gray>┃ <white><staff> <#AAFFAA>unbanned <white><player><#AAFFAA>."
  unmute: "<gradient:#E74C3C:#C0392B><bold>⚠ STAFF</bold></gradient> <dark_gray>┃ <white><staff> <#80DEEA>unmuted <white><player><#80DEEA>."
